apiVersion: batch/v1
kind: CronJob
metadata:
  name: usom-sync-full
  namespace: usom-bridge
spec:
  schedule: "0 3 * * 0"            # Pazar 03:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 36000  # 10 saat (USOM rate-limit'i icin tampon)
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: ghcr.io/sinansh/usom-bridge:latest
              imagePullPolicy: IfNotPresent
              args: ["sync-once", "full"]
              env:
                - name: USOM_BRIDGE_ROOT
                  value: /data
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "1000m"
                  memory: "512Mi"
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: usom-data
