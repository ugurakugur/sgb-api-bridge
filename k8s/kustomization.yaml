apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sgb-api-bridge

resources:
  - namespace.yaml
  - pvc.yaml
  - cronjob-delta.yaml
  - deployment.yaml
  - service.yaml
  # - ingress.yaml.example    # Ingress'i kullanmak istersen yorum'u ac
  #
  # job-full.yaml KASITLI olarak burada DEGIL — tek seferlik manuel bootstrap icin.
  # Gerekirse elle uygula: kubectl apply -f k8s/job-full.yaml

# Image tag'i merkezi ayarla
images:
  - name: ghcr.io/bilsectr/sgb-api-bridge
    newTag: latest

# Kurulum:
#   kubectl apply -k k8s/
# Veya:
#   kustomize build k8s/ | kubectl apply -f -
