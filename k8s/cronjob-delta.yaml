# Saatlik FULL sync + SIEM pack + TAXII tree rebuild.
# Eski isim sgb-sync-delta korunuyor (geri uyumluluk; ConfigMap/RBAC referanslarini
# bozmamak icin). Davranis: per-page=1000 ile ~10 dk full sync, ardindan
# build_taxii (docs/taxii/), pack (feeds/, siem/). Smart upsert sayesinde
# degisiklik yoksa cikti'lar byte-identical kalir.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sgb-sync-delta
  namespace: sgb-api-bridge
spec:
  schedule: "23 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800   # 30 dk
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: ghcr.io/bilsectr/sgb-api-bridge:latest
              imagePullPolicy: IfNotPresent
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  python /app/scripts/sync.py --mode full
                  python /app/scripts/export.py || echo "export hata - devam"
                  python /app/scripts/build_pack.py || echo "pack hata - devam"
                  python /app/scripts/build_splunk_ta.py || echo "splunk-ta hata - devam"
                  python /app/scripts/build_taxii.py --compact || echo "taxii hata - devam"
              env:
                - name: SGB_BRIDGE_ROOT
                  value: /data
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: sgb-data
