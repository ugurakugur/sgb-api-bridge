apiVersion: batch/v1
kind: CronJob
metadata:
  name: usom-sync-delta
  namespace: usom-bridge
spec:
  schedule: "23 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800   # 30 dk
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: ghcr.io/sinansh/usom-bridge:latest
              imagePullPolicy: IfNotPresent
              args: ["sync-once", "delta"]
              env:
                - name: USOM_BRIDGE_ROOT
                  value: /data
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: usom-data
