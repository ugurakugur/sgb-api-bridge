name: Sync (delta, hourly)

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Delta sync (txt feed + SQLite dual-write)
        run: python scripts/sync.py --mode delta

      - name: Health check
        run: python scripts/sync.py --mode healthcheck

      - name: Commit txt feed + state + DB
        run: |
          git config user.name "sgb-api-bridge-bot"
          git config user.email "noreply@github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "Delta sync $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      # --- SIEM Pack artifact build (S7) ---
      # feeds/, siem/qradar/out/, siem/splunk/out/ commit edilmez (.gitignore).
      # Workflow artifact olarak indirilebilir (30 gun) + release.yml tag'lerinde
      # GitHub Release'e eklenir.

      - name: Build feeds/ (master CSV + JSONL + STIX 2.1 + slices)
        # DB henuz dolu degilse (ilk delta bootstrap'tan once) skip
        run: |
          if [ -f state/sgb.db ]; then
            python scripts/export.py
          else
            echo "state/sgb.db yok - export skip (full sync henuz calismadi)"
          fi

      - name: Build QRadar pack
        run: |
          if [ -f state/sgb.db ]; then
            python scripts/build_pack.py
          else
            echo "skip"
          fi

      - name: Build Splunk TA
        run: |
          if [ -f state/sgb.db ]; then
            python scripts/build_splunk_ta.py
          else
            echo "skip"
          fi

      - name: Upload feeds artifact
        if: always() && hashFiles('feeds/index.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sgb-feeds-${{ github.run_number }}
          path: feeds/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload QRadar pack artifact
        if: always() && hashFiles('siem/qradar/out/manifest.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sgb-qradar-pack-${{ github.run_number }}
          path: siem/qradar/out/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Splunk TA artifact
        if: always() && hashFiles('siem/splunk/out/TA-sgb-threatintel.tar.gz') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sgb-splunk-ta-${{ github.run_number }}
          path: |
            siem/splunk/out/TA-sgb-threatintel.tar.gz
            siem/splunk/out/manifest.json
          retention-days: 30
          if-no-files-found: ignore
