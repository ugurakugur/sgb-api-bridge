# NOT: Per-page=1000 sonrasi full sync ~10 dk surdugu icin saatlik workflow
# (sync-delta.yml) artik zaten full sync calistiriyor. Bu workflow yalniz
# istisnai durumlarda kullanilir: state/seen_ids.json bozulmasi, manuel
# bootstrap, veya sifirdan re-sync isteyen forklar icin.
name: Sync (full, manual force-rebuild)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run full sync
        timeout-minutes: 320
        continue-on-error: true
        run: python scripts/sync.py --mode full
      - name: Commit & push (always)
        # NOT: state/sgb.db .gitignore'da - rolling release 'feeds-latest'
        # asset'i olarak sync-delta.yml tarafindan dagitiliyor.
        if: always()
        run: |
          git config user.name "sgb-api-bridge-bot"
          git config user.email "noreply@github.com"
          git add docs/ state/seen_ids.json || true
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "Full sync $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
