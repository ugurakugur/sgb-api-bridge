# NOT: Per-page=1000 sonrasi full sync ~10 dk surdugu icin saatlik workflow
# (sync-delta.yml) artik zaten full sync calistiriyor. Bu workflow yalniz
# istisnai durumlarda kullanilir: state/seen_ids.json bozulmasi, manuel
# bootstrap, veya sifirdan re-sync isteyen forklar icin.
name: Sync (full, manual force-rebuild)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run full sync
        timeout-minutes: 320
        continue-on-error: true
        run: python scripts/sync.py --mode full
      - name: Commit & push (always)
        if: always()
        run: |
          git config user.name "sgb-api-bridge-bot"
          git config user.email "noreply@github.com"
          git add docs/ state/ || true
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "Full sync $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      # --- SIEM Pack artifact build (S7) ---
      - name: Build SIEM artifacts
        if: success()
        run: |
          python scripts/export.py
          python scripts/build_pack.py
          python scripts/build_splunk_ta.py

      - name: Upload feeds artifact
        if: success() && hashFiles('feeds/index.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sgb-feeds-full-${{ github.run_number }}
          path: feeds/
          retention-days: 90

      - name: Upload QRadar pack
        if: success() && hashFiles('siem/qradar/out/manifest.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sgb-qradar-pack-full-${{ github.run_number }}
          path: siem/qradar/out/
          retention-days: 90

      - name: Upload Splunk TA
        if: success() && hashFiles('siem/splunk/out/TA-sgb-threatintel.tar.gz') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sgb-splunk-ta-full-${{ github.run_number }}
          path: |
            siem/splunk/out/TA-sgb-threatintel.tar.gz
            siem/splunk/out/manifest.json
          retention-days: 90

      - name: Re-trigger if incomplete
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if grep -q '"resume_page"' state/seen_ids.json 2>/dev/null; then
            echo "Resume_page hala var - full sync bitmedi, tekrar tetikleniyor"
            gh workflow run sync-full.yml --ref main || echo "Tetikleme basarisiz, manuel re-run gerekebilir"
          else
            echo "Full sync tamam"
          fi
