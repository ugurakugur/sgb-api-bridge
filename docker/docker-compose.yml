# Tek konteyner ile her sey: docker compose up -d
#
# Bu compose dosyasi all-in-one calistirir. Sync ve serve ayni konteyner'da.
# Imaj gecmis feed verisini gomulu tasir; ilk acilista hemen kullanilabilir.
# Internal loop her saat delta sync calistirir. Full sync GEREKMEZ.
#
# Veri /data volume'unda kalir (state + feed'ler). Konteyner'i silsen bile veri yasar.

services:
  sgb-api-bridge:
    image: ghcr.io/bilsectr/sgb-api-bridge:latest
    container_name: sgb-api-bridge
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - sgb-data:/data
    environment:
      # Opsiyonel: delta sikligini saniye cinsinden override (default 3600)
      # SGB_BRIDGE_DELTA_INTERVAL_SEC: "3600"
      # Opsiyonel: delta'nin tek seferde gezecegi maks. sayfa (default 1000)
      # SGB_BRIDGE_DELTA_MAX_PAGES: "1000"
      # SIEM Pack otomatik rebuild (default acik). 0 yaparsan feeds/ ve siem/*/out/
      # uretilmez; sadece klasik txt feed davranisi kalir.
      # SGB_BRIDGE_PACK_ENABLED: "1"
      # QRadar push istersen (opsiyonel; degerler verilmezse push komutu hata verir):
      # SGB_QRADAR_HOST: "qradar.kurum.local"
      # SGB_QRADAR_TOKEN: "xxxx-xxxx-xxxx-xxxx"
      TZ: "Europe/Istanbul"

volumes:
  sgb-data:
    name: sgb-api-bridge-data
