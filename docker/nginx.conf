server {
    listen 80 default_server;
    server_name _;
    root /data/docs;
    index index.html;

    autoindex off;

    # Klasik docs/ feed'leri (geriye uyumlu): domain-list.txt, ip-list.txt, stats.json, ...
    location ~* \.(txt|json|csv|jsonl)$ {
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SIEM Pack artifact'lari. ^~ modifier prefix match'i regex'lere karsi
    # oncelikli yapar; aksi halde ustteki txt|json|csv regex'i golgeler.
    location ^~ /feeds/ {
        alias /data/feeds/;
        autoindex on;
        autoindex_format html;
        types {
            text/plain                 txt;
            text/csv                   csv;
            application/json           json;
            application/json           jsonl;
            application/stix+json      stix2.json;
        }
        default_type application/octet-stream;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /siem/ {
        alias /data/siem/;
        autoindex on;
        autoindex_format html;
        types {
            text/plain         txt;
            text/csv           csv;
            application/json   json;
            application/gzip   tar.gz;
        }
        default_type application/octet-stream;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Tarball: download attachment
        location ~* \.tar\.gz$ {
            add_header Content-Disposition "attachment" always;
            add_header Access-Control-Allow-Origin "*" always;
        }
    }

    # --- TAXII 2.1 servisi (docs/taxii/ ciktisi) ---
    # build_taxii.py statik bir TAXII agaci uretir; nginx onu olduğu gibi
    # serve eder. __TAXII_BASE__ placeholder'i kendi host'umuza rewrite ederiz.
    # Not: ?added_after=&limit=&next= query semantigi Cloudflare Worker'da
    # implementlidir; nginx-only sunumda client sayfa-sayfa cursor ile gezer.
    location ^~ /taxii2/ {
        alias /data/docs/taxii/taxii2/;
        default_type "application/taxii+json;version=2.1";
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        sub_filter '__TAXII_BASE__' '$scheme://$host';
        sub_filter_once off;
        sub_filter_types application/json application/taxii+json;
        try_files $uri ${uri}index.json =404;
    }

    location ^~ /api/ {
        alias /data/docs/taxii/api/;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        sub_filter '__TAXII_BASE__' '$scheme://$host';
        sub_filter_once off;
        sub_filter_types application/json application/taxii+json;

        # STIX objesi sayfalari -> application/stix+json
        location ~ /api/collections/[^/]+/objects/page-[0-9]+\.json$ {
            default_type "application/taxii+json;version=2.1";
        }
        location ~ /api/collections/[^/]+/manifest/page-[0-9]+\.json$ {
            default_type "application/taxii+json;version=2.1";
        }
        # index.json (api root, collections, collection-meta, pages.json)
        default_type "application/taxii+json;version=2.1";
        try_files $uri ${uri}index.json =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ /\. { deny all; }
    location ~ \.partial$ { deny all; }
    location ~ \.tmp$ { deny all; }
    location ~ \.db(-wal|-shm)?$ { deny all; }
}
