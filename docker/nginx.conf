server {
    listen 80 default_server;
    server_name _;
    root /data/docs;
    index index.html;

    # Auto-index ekrani kapali; bilinen dosya isimleri uzerinden erisim
    autoindex off;

    # Plain text feed'ler
    location ~* \.(txt|json)$ {
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Hidden ve partial dosyalari servis etme
    location ~ /\. { deny all; }
    location ~ \.partial$ { deny all; }
}
