# SGB API Bridge - GitLab CI/CD
#
# Kurulum adimlari icin: docs/setup-gitlab.md
#
# Servis modeli: Repo'ya commit eden ve raw URL ile sunan model.
# FortiGate vb. soyle bir URL'den ceker:
#   https://gitlab.kurum.local/<group>/<project>/-/raw/main/docs/domain-list.txt
#
# Repo'nun "Internal" gorunurlukte olmasi (tum oturum acmis kullanicilar erisir)
# veya tamamen "Public" olmasi gerekir. Aksi takdirde FortiGate token koyamadigi icin
# erisemez. Alternatif: Pages job'unu acin (asagida yorumda).

stages:
  - sync
  - pack    # SIEM Pack artifact build (feeds/, qradar pack, splunk TA)
  - publish
  - release # tag bazli GitLab Release

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "10"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Push icin gereken yapi (her job icin paylasilan)
.push_setup: &push_setup
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl
    - git config user.name "sgb-api-bridge-bot"
    - git config user.email "noreply@${CI_SERVER_HOST}"
    - |
      if [ -z "$GIT_PUSH_TOKEN" ]; then
        echo "HATA: GIT_PUSH_TOKEN CI/CD variable'i tanimli degil."
        echo "Settings -> Access Tokens -> write_repository scope ile token olustur,"
        echo "Settings -> CI/CD -> Variables -> GIT_PUSH_TOKEN (masked, protected) ekle."
        exit 1
      fi
    - git remote set-url origin "https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git checkout -B "$CI_COMMIT_REF_NAME"

# ---- Delta sync: saatlik ----
sync:delta:
  stage: sync
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SYNC_MODE == "delta"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $SYNC_MODE == "delta"'
  <<: *push_setup
  script:
    - pip install -q --cache-dir "$PIP_CACHE_DIR" requests
    - python scripts/sync.py --mode delta
    - python scripts/sync.py --mode healthcheck
    - git add docs/ state/
    - |
      if git diff --staged --quiet; then
        echo "Degisiklik yok"
      else
        git commit -m "Delta sync $(date -u +%FT%TZ)"
        git push origin "HEAD:$CI_COMMIT_REF_NAME"
      fi
  cache:
    key: pip
    paths: [.cache/pip]
  timeout: 30m
  resource_group: sgb-sync

# ---- Full sync: YALNIZCA manuel (ilk bootstrap / sifirdan re-sync) ----
# Haftalik schedule YOK — SGB full sync'i 15+ saat surdugu icin pratik degil.
# Repo gecmis veriyi zaten icerir; normal calismada sadece delta yeterli.
# Calistirmak icin: Build -> Pipelines -> Run pipeline -> SYNC_MODE=full
sync:full:
  stage: sync
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $SYNC_MODE == "full"'
  <<: *push_setup
  script:
    - pip install -q --cache-dir "$PIP_CACHE_DIR" requests
    # || true cunku step-level timeout yok; runner timeout'a takilirsa exit code'unu yutalim ki commit yine de calissin
    - python scripts/sync.py --mode full || echo "Full sync runner timeout'una takilmis olabilir - commit yine de yapilacak"
    - git add docs/ state/
    - |
      if git diff --staged --quiet; then
        echo "Degisiklik yok"
      else
        git commit -m "Full sync $(date -u +%FT%TZ)"
        git push origin "HEAD:$CI_COMMIT_REF_NAME"
      fi
    # Resume_page state'te kaldiysa yeni pipeline tetikle (kendini cagiran zincir)
    - |
      if grep -q '"resume_page"' state/seen_ids.json 2>/dev/null; then
        echo "Full sync bitmedi - resume_page kaldi. Yeni pipeline tetikleniyor."
        curl -fsS -X POST \
          --header "PRIVATE-TOKEN: ${GIT_PUSH_TOKEN}" \
          --form "ref=$CI_COMMIT_REF_NAME" \
          --form "variables[SYNC_MODE]=full" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipeline" \
          || echo "Yeni pipeline tetiklenemedi, manuel re-run gerekebilir."
      else
        echo "Full sync tamam."
      fi
  cache:
    key: pip
    paths: [.cache/pip]
  timeout: 6h
  resource_group: sgb-sync

# ---- SIEM Pack build (S7) ----
# Her sync sonrasi (delta/full bittikten sonra) ayni pipeline icinde
# feeds/, siem/qradar/out/, siem/splunk/out/ uretilir ve GitLab artifact
# olarak indirilebilir hale gelir. Commit edilmez (.gitignore).

.pack_base: &pack_base
  stage: pack
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - pip install -q --cache-dir "$PIP_CACHE_DIR" requests
  script:
    - |
      if [ ! -f state/sgb.db ]; then
        echo "state/sgb.db yok - sync once calismadi, pack skip"
        exit 0
      fi
    - python scripts/export.py
    - python scripts/build_pack.py
    - python scripts/build_splunk_ta.py
  cache:
    key: pip
    paths: [.cache/pip]
  artifacts:
    name: "sgb-siem-pack-${CI_PIPELINE_ID}"
    paths:
      - feeds/
      - siem/qradar/out/
      - siem/splunk/out/
    expire_in: 30 days
    when: always

pack:delta:
  <<: *pack_base
  needs: ["sync:delta"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SYNC_MODE == "delta"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $SYNC_MODE == "delta"'

pack:full:
  <<: *pack_base
  needs: ["sync:full"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $SYNC_MODE == "full"'
  artifacts:
    name: "sgb-siem-pack-full-${CI_PIPELINE_ID}"
    paths: [feeds/, siem/qradar/out/, siem/splunk/out/]
    expire_in: 90 days
    when: always

# ---- Tag bazli SIEM Pack release (v*) ----
# git tag v1.0.0 && git push origin v1.0.0
# GitLab Release sayfasinda kalici versiyonlu paket olusur.
release:siem-pack:
  stage: release
  image: python:3.11-slim
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/'
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl
    - pip install -q --cache-dir "$PIP_CACHE_DIR" requests
  script:
    - |
      if [ ! -f state/sgb.db ]; then
        echo "HATA: state/sgb.db yok. Once full sync calistir ve commit'le."
        exit 1
      fi
    - python scripts/export.py
    - python scripts/build_pack.py
    - python scripts/build_splunk_ta.py
    - mkdir -p release-assets
    - tar -czf release-assets/sgb-feeds.tar.gz feeds/
    - tar -czf release-assets/sgb-qradar-pack.tar.gz -C siem/qradar/out .
    - cp siem/splunk/out/TA-sgb-threatintel.tar.gz release-assets/
    - cp feeds/stix/sgb-*.stix2.json release-assets/ 2>/dev/null || true
    - cp feeds/index.json release-assets/feeds-index.json
    - cp siem/qradar/out/manifest.json release-assets/qradar-manifest.json
    - cp siem/splunk/out/manifest.json release-assets/splunk-manifest.json
    - cd release-assets && sha256sum * > SHA256SUMS && cd ..
    # GitLab Package Registry'a yukle (release-cli'in indirilebilir referans almasi icin)
    - |
      for f in release-assets/*; do
        name=$(basename "$f")
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/sgb-siem-pack/${CI_COMMIT_TAG}/${name}"
      done
  artifacts:
    paths: [release-assets/]
    expire_in: never
  cache:
    key: pip
    paths: [.cache/pip]
  release:
    name: "SGB SIEM Pack $CI_COMMIT_TAG"
    description: |
      Otomatik uretilmis SIEM Pack.
      Indirilebilir paketler: GitLab Package Registry > sgb-siem-pack > $CI_COMMIT_TAG
      Icerik: feeds (master CSV/JSONL + STIX 2.1), QRadar pack, Splunk TA.
    tag_name: "$CI_COMMIT_TAG"

